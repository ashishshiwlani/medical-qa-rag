name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install lightweight dependencies
        # Heavy deps (torch, faiss, sentence-transformers) are lazily imported
        # and mocked in tests — only install what the test suite actually needs
        run: pip install numpy pandas pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
